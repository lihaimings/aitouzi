market: A-share
universe:
  - ETF
  - A-stock
data_source:
  primary: AkShare
  tushare_token: ${TUSHARE_TOKEN}
llm:
  provider: external_api  # 使用你的大模型API
  use_cases:
    - news_summary
    - sentiment
    - research_automation
trading:
  mode: paper
  constraints:
    - T+1
    - limit_up_down
    - suspension
  risk_limits:
    max_daily_drawdown: -0.05
    max_total_drawdown: -0.15
    max_position_weight: 0.60
research:
  ai_review:
    enabled: true
  regime:
    lookback_days: 20
    bull_threshold: 0.03
    bear_threshold: -0.03
report:
  push:
    feishu: true
    target: current_dm  # 可改为特定chat_id
  schedule:
    daily: true
    weekly: true
    monthly: true
