market: A-share
universe:
  - ETF
  - A-stock
data_source:
  primary: AkShare
  tushare_token: ${TUSHARE_TOKEN}
llm:
  provider: external_api  # 使用你的大模型API
  base_url: http://localhost:8317/v1
  api_key: your-api-key-1
  model: gpt-5.3-codex
  use_cases:
    - news_summary
    - sentiment
    - research_automation
trading:
  mode: paper
  init_cash: 10000
  execution_time: "14:50"
  constraints:
    - T+1
    - limit_up_down
    - suspension
  risk_limits:
    max_daily_drawdown: -0.05
    max_total_drawdown: -0.15
    max_position_weight: 0.60
  cost_model:
    fee_bps: 5.0
    slippage_bps: 5.0
    impact_bps: 2.0
    impact_power: 0.5
    impact_bps_cap_mult: 5.0
  stop_guard:
    daily_loss_stop: -0.03
    monthly_drawdown_stop: -0.10
    stop_cooldown_days: 3
  regime_filter:
    enabled: true
    ma_window: 200
    vol_window: 20
    high_vol_threshold: 0.02
    defensive_exposure: 0.30
  strategy_score:
    mom_short: 20
    mom_long: 60
    vol_window: 20
    dd_window: 60
    w_mom_short: 0.50
    w_mom_long: 0.30
    w_low_vol: 0.10
    w_low_drawdown: 0.10
  timing_switch:
    enabled: true
    short_ma: 20
    long_ma: 120
    gate_threshold: 0.0
    amplify_threshold: 0.02
    amplify_mult: 1.20
    defensive_scale: 0.50
  adaptive_top_n:
    enabled: true
    top_n_strong: 1
    top_n_neutral: 2
    top_n_weak: 4
    trend_strong_threshold: 0.03
    trend_weak_threshold: 0.00
  anti_whipsaw:
    buy_threshold: -0.05
    sell_threshold: -0.12
    entry_confirm_periods: 2
    min_hold_rebalance_periods: 2
    reentry_cooldown_periods: 1
  ai_referee:
    enabled: true
    exposure_cap: 0.15
    max_llm_points: 60
    apply_if_better: true
research:
  ai_review:
    enabled: true
  regime:
    lookback_days: 20
    bull_threshold: 0.03
    bear_threshold: -0.03
report:
  push:
    feishu: true
    target: current_dm  # 可改为特定chat_id
  schedule:
    daily: true
    weekly: true
    monthly: true
operations:
  preflight:
    fresh_days: 5
    min_rows: 240
    min_usable_ratio_fail: 0.03
    min_usable_ratio_warn: 0.10
    min_usable_count_fail: 5
  quality_redline:
    min_rows_fail: 240
    min_rows_warn: 500
    severe_jump_threshold: 0.25
    jump_warn_count: 3
    missing_ratio_warn: 0.01
  simulation_targets:
    annual_return_min: 0.15
    max_drawdown_min: -0.20
    sharpe_min: 0.80
  param_freeze:
    freeze_days: 90
  notify:
    push_daily_detail: false
    push_on_anomaly: true
    push_trade_changes: true
    trade_change_min_weight: 0.001
    trade_change_min_notional: 10
    quality_fail_alert_count: 6
  health_alert:
    consecutive_red_days: 2
