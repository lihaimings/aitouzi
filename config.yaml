market: A-share
universe:
  - ETF
  - A-stock
data_source:
  primary: AkShare
  tushare_token: ${TUSHARE_TOKEN}
llm:
  provider: external_api  # 使用你的大模型API
  use_cases:
    - news_summary
    - sentiment
    - research_automation
trading:
  mode: paper
  constraints:
    - T+1
    - limit_up_down
    - suspension
  risk_limits:
    max_daily_drawdown: -0.05
    max_total_drawdown: -0.15
    max_position_weight: 0.60
  cost_model:
    fee_bps: 5.0
    slippage_bps: 5.0
    impact_bps: 2.0
    impact_power: 0.5
    impact_bps_cap_mult: 5.0
  stop_guard:
    daily_loss_stop: -0.03
    monthly_drawdown_stop: -0.10
    stop_cooldown_days: 3
  regime_filter:
    enabled: true
    ma_window: 200
    vol_window: 20
    high_vol_threshold: 0.02
    defensive_exposure: 0.30
research:
  ai_review:
    enabled: true
  regime:
    lookback_days: 20
    bull_threshold: 0.03
    bear_threshold: -0.03
report:
  push:
    feishu: true
    target: current_dm  # 可改为特定chat_id
  schedule:
    daily: true
    weekly: true
    monthly: true
operations:
  preflight:
    fresh_days: 5
    min_rows: 240
    min_usable_ratio_fail: 0.03
    min_usable_ratio_warn: 0.10
    min_usable_count_fail: 5
  quality_redline:
    min_rows_fail: 240
    min_rows_warn: 500
    severe_jump_threshold: 0.25
    jump_warn_count: 3
    missing_ratio_warn: 0.01
  simulation_targets:
    annual_return_min: 0.08
    max_drawdown_min: -0.20
    sharpe_min: 0.80
  param_freeze:
    freeze_days: 90
  notify:
    push_daily_detail: false
    push_on_anomaly: true
    quality_fail_alert_count: 6
  health_alert:
    consecutive_red_days: 2
